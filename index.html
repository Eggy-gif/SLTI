<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SLTI 人格测试</title>
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <div class="shell">

      <!-- 首页 -->
      <section id="intro" class="screen active">
        <div class="card hero">
           <h1 class="hero-title">准备好了吗，小栗子？</h1>
          <div class="hero-actions">
            <button id="heroStartBtn" class="btn-primary">进入SLTI测试</button>
          </div>
        </div>
      </section>

      <!-- 测试页 -->
      <section id="test" class="screen">
        <div class="test-wrap card">
          <div class="topbar">
            <button id="backIntroBtn" class="btn-secondary">返回首页</button>
            <div class="progress" aria-label="Progress"><span id="progressBar"></span></div>
            <div id="progressText" class="progress-text">0 / 0</div>
          </div>
          <p id="testHint" class="subtle-hint">全选完才会放行。世界已经够乱了，起码把题做完整。</p>
          <div id="questionList" class="question-list"></div>
          <div class="hero-actions">
            <button id="submitBtn" class="btn-primary" disabled>提交并查看结果</button>
            <button id="testResult1Btn" class="btn-secondary">🧪 测试：直接显示人格1结果</button>
          </div>
        </div>
      </section>

      <!-- 结果页 -->
      <section id="result" class="screen">
        <div class="result-wrap card">
          <div class="result-layout">
            <div class="result-top">
              <div id="posterBox" class="poster-box">
                <img id="posterImage" alt="" />
                <div id="posterCaption" class="poster-caption"></div>
              </div>
              <div class="type-box">
                <div id="resultModeKicker" class="type-kicker"></div>
                <div id="resultTypeName" class="type-name"></div>
                <div id="matchBadge" class="match-badge"></div>
                <div id="rarityBadge" class="rarity-badge"></div>
                <div id="resultTypeSub" class="type-subname"></div>
              </div>
            </div>

            <div class="analysis-box">
              <h3>结果解读</h3>
              <p id="resultDesc" class="type-desc"></p>
            </div>

            <div class="nearby-box" id="nearbyBox">
              <h3>你也可能是...</h3>
              <div id="nearbyList" class="nearby-list"></div>
            </div>

            <div class="dim-box">
              <h3>十五维度</h3>
              <div id="dimList" class="dim-list"></div>
            </div>

            <div class="note-box">
              <h3>树礼推荐</h3>
              <div id="recommendList" class="rec-list"></div>
            </div>

            <div class="result-actions">
              <button id="restartBtn" class="btn-primary">重新开始</button>
              <button id="toTopBtn" class="btn-secondary">返回首页</button>
            </div>
          </div>
        </div>
      </section>

    </div>

    <script type="module" src="js/engine.js"></script>
    <script type="module" src="js/app.js"></script>
  </body>
</html>
